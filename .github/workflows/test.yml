name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        experimental: [false]
        include:
          # Early warning for the next Python (beta/rc until October);
          # failures don't block the build.
          - python-version: "3.15"
            experimental: true
    continue-on-error: ${{ matrix.experimental }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: Install
        run: pip install -e .[test]
      - name: Run tests
        run: pytest tests/ -q
      - name: CLI smoke test
        # No trailing newline on the input: segments preserve input bytes
        # exactly, so a trailing \n would stay inside the last segment and
        # print as an extra blank line.
        run: |
          printf 'Перше речення. Друге речення!' | choppa -l uk_two | tee out.txt
          printf 'Перше речення. \nДруге речення!\n' | diff - out.txt

  java-identity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install
        run: pip install -e .
      - name: Fetch the Java segment reference implementation
        run: |
          curl -sfL -o segment.zip https://github.com/loomchild/segment/releases/download/2.0.3/segment-2.0.3.zip
          unzip -q segment.zip
      - name: Assert bundled rules match the pinned LanguageTool commit
        run: |
          PINNED=$(tr -d '[:space:]' < choppa/data/srx/LT_COMMIT)
          [[ "$PINNED" =~ ^[0-9a-f]{40}$ ]] || { echo "bad pin: $PINNED"; exit 1; }
          curl -sfL -o pinned.srx "https://raw.githubusercontent.com/languagetool-org/languagetool/$PINNED/languagetool-core/src/main/resources/org/languagetool/resource/segment.srx"
          cmp pinned.srx choppa/data/srx/languagetool_segment.srx
      - name: Byte-identity gate vs Java segment
        run: |
          segment-2.0.3/bin/segment -a ultimate -s choppa/data/srx/languagetool_segment.srx \
            -l uk_two -r -i tests/data/ci_corpus/uk_wikipedia.txt -o java.txt -e $'\x01'
          python scripts/benchmark.py tests/data/ci_corpus/uk_wikipedia.txt \
            --language uk_two --java java.txt
