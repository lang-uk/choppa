name: Upstream drift watch

# Weekly check that the bundled LanguageTool segment.srx still matches
# upstream master; opens an issue when LanguageTool moves. This exists
# because the rules once drifted 142 commits (2022-2026) without anyone
# noticing.

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compare bundled segment.srx with LanguageTool master
        id: diff
        run: |
          SRX_PATH="languagetool-core/src/main/resources/org/languagetool/resource/segment.srx"
          curl -sL -o upstream.srx "https://raw.githubusercontent.com/languagetool-org/languagetool/master/$SRX_PATH"
          if cmp -s upstream.srx choppa/data/srx/languagetool_segment.srx; then
            echo "drifted=false" >> "$GITHUB_OUTPUT"
          else
            echo "drifted=true" >> "$GITHUB_OUTPUT"
            LATEST=$(curl -s "https://api.github.com/repos/languagetool-org/languagetool/commits?path=$SRX_PATH&per_page=1" \
              | python3 -c "import json,sys; c=json.load(sys.stdin)[0]; print(c['sha'][:10], c['commit']['author']['date'][:10])")
            echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          fi
      - name: Open issue if drifted
        if: steps.diff.outputs.drifted == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE="Upstream segment.srx has drifted from the bundled snapshot"
          OPEN=$(gh issue list --state open --search "\"$TITLE\" in:title" --json number --jq length)
          if [ "$OPEN" = "0" ]; then
            gh issue create --title "$TITLE" --body "LanguageTool master's segment.srx no longer matches choppa/data/srx/languagetool_segment.srx (latest upstream change: ${{ steps.diff.outputs.latest }}). Refresh per choppa/data/srx/PROVENANCE.md, re-run the test suite and the corpus differential, and update PROVENANCE.md."
          fi
